<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headland Cyber | Securing your digital coastline</title>
    <meta name="description" content="Headland Cyber - Premium cybersecurity monitoring for Australian SMBs. Coming soon.">
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            DEFAULT: '#0a192f',
                            lighter: '#112240',
                        },
                        teal: {
                            DEFAULT: '#64ffda',
                            hover: '#4cd8b8',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-navy text-[#ccd6f6] min-h-screen flex flex-col font-sans transition-colors duration-300">
    <div class="coastline-bg">
        <div class="wave opacity-10 animate-[waveFlow_15s_linear_infinite]"></div>
        <div class="wave opacity-20 -delay-[5s] animate-[waveFlow_25s_linear_infinite]"></div>
        <div class="wave opacity-30 -delay-[10s] animate-[waveFlow_35s_linear_infinite]"></div>
    </div>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-navy/85 backdrop-blur-md border-b border-teal/10">
        <div class="flex items-center gap-3">
            <!-- Inline SVG Logo -->
            <svg id="logo" width="40" height="40" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-container">
                <path d="M200 20C120 20 40 50 40 160C40 270 120 340 200 380C280 340 360 270 360 160C360 50 280 20 200 20Z" fill="currentColor" class="text-navy transition-colors duration-300" />
                <circle cx="200" cy="100" r="15" fill="var(--accent-color)" />
                <path d="M140 80C140 80 160 50 200 50C240 50 260 80 260 80" stroke="var(--accent-color)" stroke-width="12" stroke-linecap="round" />
                <path d="M110 110C110 110 140 60 200 60C260 60 290 110 290 110" stroke="var(--accent-color)" stroke-width="12" stroke-linecap="round" />
                <path d="M40 180C120 150 280 220 360 170V230C280 260 120 200 40 230V180Z" fill="var(--accent-color)" opacity="0.6" />
                <path d="M40 240C120 220 280 280 360 240V300C280 330 120 280 40 300V240Z" fill="var(--accent-color)" opacity="0.8" />
                <path d="M40 310C120 300 280 340 360 310V340C280 360 120 350 40 340V310Z" fill="var(--accent-color)" />
                <path d="M200 100L250 150" stroke="var(--accent-color)" stroke-width="8" stroke-linecap="round" />
            </svg>
            <span class="text-xl font-extrabold tracking-tight text-teal">Headland Cyber</span>
        </div>
        <button id="theme-toggle" class="p-2 rounded-full border border-teal text-teal hover:bg-teal/10 transition-all duration-300">
            <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
            <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6 pt-20">
        <div class="text-center">
            <div class="inline-block px-4 py-2 mb-8 rounded-full bg-navy-lighter/70 border border-teal/20 text-teal text-[10px] sm:text-xs font-bold uppercase tracking-[0.2em] shadow-[0_0_15px_rgba(100,255,218,0.1)] fade-in">
                Launching Soon
            </div>
            
            <h1 class="text-5xl sm:text-7xl md:text-8xl font-black mb-6 tracking-tight bg-gradient-to-br from-white via-white to-teal bg-clip-text text-transparent fade-in-up">
                Headland Cyber
            </h1>
            
            <p class="text-lg sm:text-2xl text-[#8892b0] max-w-2xl mx-auto leading-relaxed fade-in-up delay-200">
                Securing your <span class="text-teal font-medium">digital coastline</span>.
            </p>
        </div>
    </main>

    <footer class="py-12 text-center text-[#8892b0] text-sm opacity-60">
        &copy; 2026 Headland Cyber. All rights reserved.
    </footer>

    <script src="script.js"></script>
</body>
</html>
